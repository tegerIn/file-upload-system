<section id="drive-view" class="hidden">
  <div class="drive-toolbar card">
    <div class="toolbar-top">
      <nav id="breadcrumb" class="breadcrumb" aria-label="경로"></nav>
      <button type="button" id="btn-empty-trash" class="btn secondary hidden">
        휴지통 비우기
      </button>
    </div>
    <div class="toolbar-actions">
      <label class="btn secondary file-pick">
        파일 업로드
        <input type="file" id="input-upload" hidden />
      </label>
      <button type="button" id="btn-new-folder" class="btn secondary">새 폴더</button>
    </div>
  </div>
  <div class="drive-floating-controls">
    <div class="toolbar-sort-view">
      <div class="control-dropdown">
        <span>정렬</span>
        <button type="button" id="btn-sort-menu" class="select-control" aria-expanded="false">
          <span id="sort-label">최신순</span>
        </button>
        <div id="sort-menu" class="control-menu hidden">
          <button type="button" class="control-menu-item" data-sort="created">최신순</button>
          <button type="button" class="control-menu-item" data-sort="name">이름순</button>
        </div>
      </div>
      <div class="control-dropdown">
        <span>보기</span>
        <button type="button" id="btn-view-menu" class="select-control" aria-expanded="false">
          <span id="view-label">폴더형</span>
        </button>
        <div id="view-menu" class="control-menu hidden">
          <button type="button" class="control-menu-item" data-view="grid">폴더형</button>
          <button type="button" class="control-menu-item" data-view="list">리스트형</button>
        </div>
      </div>
    </div>
  </div>
  <div id="drive-error" class="message error hidden" role="alert"></div>
  <div id="drive-list" class="drive-grid" aria-live="polite"></div>
</section>

<div id="move-modal" class="move-modal hidden" role="dialog" aria-modal="true" aria-label="폴더 이동">
  <button type="button" id="move-modal-backdrop" class="move-modal-backdrop" aria-label="닫기"></button>
  <div class="move-modal-dialog card">
    <div class="move-modal-head">
      <h3>폴더 이동</h3>
      <button type="button" id="btn-move-modal-close" class="recovery-close" aria-label="닫기">×</button>
    </div>
    <p class="move-modal-desc">이동할 폴더를 선택해 주세요.</p>
    <div id="move-folder-tree" class="move-folder-tree"></div>
    <div class="move-modal-actions">
      <button type="button" id="btn-move-modal-cancel" class="btn ghost">취소</button>
      <button type="button" id="btn-move-modal-confirm" class="btn primary">이동</button>
    </div>
  </div>
</div>

<div
  id="new-folder-modal"
  class="move-modal hidden"
  role="dialog"
  aria-modal="true"
  aria-label="새 폴더 만들기"
>
  <button
    type="button"
    id="new-folder-modal-backdrop"
    class="move-modal-backdrop"
    aria-label="닫기"
  ></button>
  <div class="move-modal-dialog card">
    <div class="move-modal-head">
      <h3>새 폴더</h3>
      <button type="button" id="btn-new-folder-modal-close" class="recovery-close" aria-label="닫기">
        ×
      </button>
    </div>
    <form id="form-new-folder" class="stack">
      <label class="field">
        <span>폴더 이름을 작성하세요.</span>
        <input type="text" id="new-folder-name" maxlength="100" placeholder="새 폴더 이름" />
      </label>
      <p id="new-folder-error" class="message error hidden" role="alert"></p>
      <div class="move-modal-actions">
        <button type="button" id="btn-new-folder-cancel" class="btn ghost">취소</button>
        <button type="submit" class="btn primary">만들기</button>
      </div>
    </form>
  </div>
</div>

<div
  id="rename-modal"
  class="move-modal hidden"
  role="dialog"
  aria-modal="true"
  aria-label="이름 변경"
>
  <button
    type="button"
    id="rename-modal-backdrop"
    class="move-modal-backdrop"
    aria-label="닫기"
  ></button>
  <div class="move-modal-dialog card">
    <div class="move-modal-head">
      <h3>이름 변경</h3>
      <button type="button" id="btn-rename-modal-close" class="recovery-close" aria-label="닫기">
        ×
      </button>
    </div>
    <form id="form-rename-item" class="stack">
      <label class="field">
        <span>새 이름</span>
        <input type="text" id="rename-item-name" maxlength="100" autocomplete="off" />
      </label>
      <p id="rename-item-error" class="message error hidden" role="alert"></p>
      <div class="move-modal-actions">
        <button type="button" id="btn-rename-cancel" class="btn ghost">취소</button>
        <button type="submit" class="btn primary">저장</button>
      </div>
    </form>
  </div>
</div>

<div
  id="delete-modal"
  class="move-modal hidden"
  role="dialog"
  aria-modal="true"
  aria-label="항목 삭제"
>
  <button
    type="button"
    id="delete-modal-backdrop"
    class="move-modal-backdrop"
    aria-label="닫기"
  ></button>
  <div class="move-modal-dialog card">
    <div class="move-modal-head">
      <h3>삭제 확인</h3>
      <button type="button" id="btn-delete-modal-close" class="recovery-close" aria-label="닫기">
        ×
      </button>
    </div>
    <p id="delete-modal-message" class="move-modal-desc"></p>
    <div class="move-modal-actions">
      <button type="button" id="btn-delete-cancel" class="btn ghost">취소</button>
      <button type="button" id="btn-delete-confirm" class="btn danger">삭제</button>
    </div>
  </div>
</div>

<div
  id="notice-modal"
  class="move-modal hidden"
  role="dialog"
  aria-modal="true"
  aria-label="알림"
>
  <button
    type="button"
    id="notice-modal-backdrop"
    class="move-modal-backdrop"
    aria-label="닫기"
  ></button>
  <div class="move-modal-dialog card">
    <div class="move-modal-head">
      <h3 id="notice-modal-title">알림</h3>
      <button type="button" id="btn-notice-modal-close" class="recovery-close" aria-label="닫기">
        ×
      </button>
    </div>
    <p id="notice-modal-message" class="move-modal-desc"></p>
    <div class="move-modal-actions">
      <button type="button" id="btn-notice-confirm" class="btn primary">확인</button>
    </div>
  </div>
</div>

<div
  id="session-renew-modal"
  class="move-modal hidden"
  role="dialog"
  aria-modal="true"
  aria-label="세션 만료"
>
  <button
    type="button"
    id="session-renew-modal-backdrop"
    class="move-modal-backdrop"
    aria-label="닫기"
  ></button>
  <div class="move-modal-dialog card">
    <div class="move-modal-head">
      <h3>로그인 만료</h3>
      <button type="button" id="btn-session-renew-close" class="recovery-close" aria-label="닫기">
        ×
      </button>
    </div>
    <p id="session-renew-modal-message" class="move-modal-desc">
      로그인 세션이 만료되었습니다. 세션을 연장할까요?
    </p>
    <div class="move-modal-actions">
      <button type="button" id="btn-session-renew-decline" class="btn ghost">아니오</button>
      <button type="button" id="btn-session-renew-accept" class="btn primary">세션 연장</button>
    </div>
  </div>
</div>

<div
  id="withdraw-modal"
  class="move-modal hidden"
  role="dialog"
  aria-modal="true"
  aria-label="회원 탈퇴"
>
  <button
    type="button"
    id="withdraw-modal-backdrop"
    class="move-modal-backdrop"
    aria-label="닫기"
  ></button>
  <div class="move-modal-dialog card">
    <div class="move-modal-head">
      <h3>회원 탈퇴</h3>
      <button type="button" id="btn-withdraw-modal-close" class="recovery-close" aria-label="닫기">
        ×
      </button>
    </div>
    <p class="move-modal-desc">회원을 탈퇴하시겠습니까? 드라이브의 내용이 삭제됩니다.</p>
    <div class="move-modal-actions">
      <button type="button" id="btn-withdraw-cancel" class="btn ghost">취소</button>
      <button type="button" id="btn-withdraw-confirm" class="btn danger">확인</button>
    </div>
  </div>
</div>
