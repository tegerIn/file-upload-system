<section id="mypage-view" class="hidden">
  <div class="card profile-card">
    <h2>마이페이지</h2>
    <form id="form-mypage" class="stack">
      <label class="field">
        <span>아이디</span>
        <input type="text" name="loginId" disabled />
      </label>
      <label class="field">
        <span>이름</span>
        <input type="text" name="name" disabled />
      </label>
      <label class="field">
        <span>이메일</span>
        <input
          type="email"
          name="email"
          id="mypage-email-input"
          autocomplete="email"
        />
        <button type="button" class="btn secondary wide" id="btn-mypage-send-email-code">
          인증번호 받기
        </button>
      </label>
      <p id="mypage-email-verify-hint" class="field-hint password-match-hint hidden" role="status"></p>
      <div id="mypage-email-verify-step" class="stack hidden">
        <p
          id="mypage-email-code-ttl-hint"
          class="field-hint email-code-ttl-hint hidden"
          role="status"
        ></p>
        <label class="field">
          <span>이메일 인증번호</span>
          <input
            type="text"
            id="mypage-email-code"
            inputmode="numeric"
            maxlength="6"
            placeholder="6자리 숫자"
            autocomplete="one-time-code"
          />
          <button type="button" class="btn secondary wide" id="btn-mypage-verify-email-code">
            인증 확인
          </button>
        </label>
      </div>
      <label class="field">
        <span>새 비밀번호</span>
        <input type="password" name="newPassword" autocomplete="new-password" />
      </label>
      <label class="field">
        <span>새 비밀번호 확인</span>
        <input type="password" name="confirmNewPassword" autocomplete="new-password" />
      </label>
      <button type="submit" class="btn btn-auth-submit wide">저장</button>
    </form>
    <p id="mypage-message" class="message" role="status"></p>
  </div>
</section>
