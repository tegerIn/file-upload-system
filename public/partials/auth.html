<section id="auth-view" class="card auth-card">
  <div class="tabs" role="tablist">
    <button type="button" class="tab active" data-tab="login">로그인</button>
    <button type="button" class="tab" data-tab="register">회원가입</button>
  </div>
  <div id="tab-login" class="tab-panel">
    <form id="form-login" class="stack">
      <label class="field">
        <span>아이디</span>
        <input
          type="text"
          name="loginId"
          required
          minlength="4"
          maxlength="20"
          pattern="[a-zA-Z0-9_]+"
          autocomplete="username"
        />
      </label>
      <label class="field">
        <span>비밀번호</span>
        <input type="password" name="password" required minlength="1" autocomplete="current-password" />
      </label>
      <div class="auth-find-row">
        <button type="button" class="text-link" id="btn-find-id">아이디 찾기</button>
        <span class="auth-find-sep" aria-hidden="true">|</span>
        <button type="button" class="text-link" id="btn-find-password">비밀번호 찾기</button>
      </div>
      <button type="submit" class="btn btn-auth-submit wide">로그인</button>
    </form>
  </div>
  <div id="tab-register" class="tab-panel hidden">
    <form id="form-register" class="stack">
      <label class="field">
        <span>아이디</span>
        <div class="register-loginid-row">
          <input
            type="text"
            name="loginId"
            required
            minlength="4"
            maxlength="20"
            pattern="[a-zA-Z0-9_]+"
            autocomplete="username"
          />
          <button type="button" class="btn secondary register-loginid-check" id="btn-register-check-loginid">
            중복 확인
          </button>
        </div>
        <p class="field-hint">4~20자, 영문·숫자·밑줄(_)</p>
        <p id="register-loginid-hint" class="field-hint password-match-hint hidden" role="status"></p>
      </label>
      <label class="field">
        <span>비밀번호</span>
        <input type="password" name="password" required minlength="8" autocomplete="new-password" />
        <p class="field-hint">8자 이상, 영문 대문자·소문자·특수문자를 각각 포함해야 합니다.</p>
        <p id="register-password-policy-hint" class="field-hint password-match-hint hidden" role="status"></p>
      </label>
      <label class="field">
        <span>비밀번호 확인</span>
        <input type="password" name="confirmPassword" required minlength="8" autocomplete="new-password" />
        <p id="register-password-match-hint" class="field-hint password-match-hint hidden" role="status"></p>
      </label>
      <div class="field-group">
        <span class="field-group-title">기본정보</span>
        <label class="field">
          <span>이름</span>
          <input type="text" name="name" required autocomplete="name" />
          <p id="register-name-hint" class="field-hint password-match-hint hidden" role="status"></p>
        </label>
        <label class="field">
          <span>이메일</span>
          <input type="email" name="email" id="register-email-input" required autocomplete="email" />
          <p id="register-email-format-hint" class="field-hint password-match-hint hidden" role="status"></p>
          <button type="button" class="btn secondary wide" id="btn-register-send-email-code">
            인증번호 발송
          </button>
        </label>
        <p id="register-email-verify-hint" class="field-hint password-match-hint hidden" role="status"></p>
        <div id="register-email-verify-step" class="stack hidden">
          <p
            id="register-email-code-ttl-hint"
            class="field-hint email-code-ttl-hint hidden"
            role="status"
          ></p>
          <label class="field">
            <span>이메일 인증번호</span>
            <input
              type="text"
              id="register-email-code"
              inputmode="numeric"
              maxlength="6"
              placeholder="6자리 숫자"
              autocomplete="one-time-code"
            />
            <button type="button" class="btn secondary wide" id="btn-register-verify-email-code">
              인증 확인
            </button>
          </label>
          <input type="hidden" name="emailVerifyToken" id="register-email-verify-token" value="" />
        </div>
      </div>
      <button type="submit" class="btn btn-auth-submit wide">가입하기</button>
    </form>
  </div>
  <p id="auth-message" class="message" role="status"></p>
</section>
